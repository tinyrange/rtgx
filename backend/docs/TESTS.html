      letter-spacing: 0;
    }

      max-width: 980px;
      margin: 0;
      color: var(--muted);
      font-size: 16px;

      gap: 10px;

      padding: 14px clamp(18px, 4vw, 48px);
      border-bottom: 1px solid var(--line);
      background: #fbfbf9;
      position: sticky;
      top: 0;
      z-index: 2;
    }

    input,
    select {
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      color: var(--ink);
      padding: 0 10px;
      font: inherit;
    }

    input {
      min-width: min(420px, 100%);
      flex: 1 1 320px;
    }

    main {
      padding: 22px clamp(18px, 4vw, 48px) 44px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 10px;
      margin-bottom: 18px;
    }

    .stat {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 12px 14px;
    }

    .stat strong {
      display: block;
      font-size: 22px;
      line-height: 1.1;
    }

    .stat span {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
    }

    section {
      margin: 0 0 22px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      overflow: hidden;
    }

    section h2 {
      margin: 0;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: var(--accent-soft);
      color: #103d39;
      font-size: 18px;
      letter-spacing: 0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 8px 10px;
      border-bottom: 1px solid var(--line);
      vertical-align: top;
      text-align: left;
    }

    th {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      background: #fafafa;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .id {
      width: 84px;
      color: var(--accent);
      font-weight: 700;
      white-space: nowrap;
    }

    .file {
      width: 210px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      color: #39414d;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 760px) {
      table,
      thead,
      tbody,
      tr,
      th,
      td {
        display: block;
      }

      thead {
        display: none;
      }

      tr {
        border-bottom: 1px solid var(--line);
        padding: 8px 0;
      }

      tr:last-child {

      }

      td {
        border-bottom: 0;
        padding: 4px 10px;
      }

      .id,
      .file {
        width: auto;
      }
    }

      return `Compile and run a package main appMain that validates ${capability.focus}; specifically ${caseText} via the ${angle}, then prints exactly PASS\\n.`;
    }

    function fileName(capability, index) {
      const n = String(index + 1).padStart(2, "0");
      return `backend/tests/${capability.slug}_${n}.go`;
    }

    const allTests = capabilities.flatMap((capability, sectionIndex) =>
      capability.cases.map((caseText, caseIndex) => {
        const number = sectionIndex * 25 + caseIndex + 1;
        const id = `RENVO-${String(number).padStart(4, "0")}`;
        const angle = angles[caseIndex];
        return {
          id,
          number,
          section: capability.name,
          file: fileName(capability, caseIndex),
          title: testTitle(capability, caseText, angle, number),
          pass: passCondition(capability, caseText, angle)
        };
      })
    );

    const testsRoot = document.getElementById("tests");
    const filterInput = document.getElementById("filter");
    const sectionFilter = document.getElementById("sectionFilter");
    const shownCount = document.getElementById("shownCount");
    const totalCount = document.getElementById("totalCount");
    const sectionCount = document.getElementById("sectionCount");

    totalCount.textContent = String(allTests.length);
    sectionCount.textContent = String(capabilities.length);

    sectionFilter.innerHTML = [
      "<option value=\"\">All capabilities</option>",
      ...capabilities.map((capability) => `<option value="${capability.name}">${capability.name}</option>`)
    ].join("");

    function render() {
      const query = filterInput.value.trim().toLowerCase();
      const selected = sectionFilter.value;
      let visible = 0;

      testsRoot.innerHTML = capabilities.map((capability) => {
        if (selected && selected !== capability.name) {
          return "";
        }

        const rows = allTests.filter((test) => test.section === capability.name).filter((test) => {
          const haystack = `${test.id} ${test.section} ${test.file} ${test.title} ${test.pass}`.toLowerCase();
          return !query || haystack.includes(query);
        });

        if (rows.length === 0) {
          return "";
        }

        visible += rows.length;
        const body = rows.map((test) => `
          <tr>
            <td class="id">${test.id}</td>
            <td class="file">${test.file}</td>
            <td>${test.title}</td>
            <td>${test.pass}</td>
          </tr>
        `).join("");

        return `
          <section>
            <h2>${capability.name}</h2>
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Future file</th>
                  <th>Test idea</th>
                  <th>Pass condition</th>
                </tr>
              </thead>
              <tbody>${body}</tbody>
            </table>
          </section>
        `;
      }).join("");

      shownCount.textContent = String(visible);
    }

    filterInput.addEventListener("input", render);
    sectionFilter.addEventListener("change", render);
    render();
