name: Tests

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  backend-amd64:
    name: Backend compiler tests (linux-amd64)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install QEMU user emulators
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user

      - name: Install Wasmtime
        run: |
          curl -fsSL https://wasmtime.dev/install.sh | bash
          echo "$HOME/.wasmtime/bin" >> "$GITHUB_PATH"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Restore compiler test cache
        uses: actions/cache@v5
        with:
          path: .rtg/test-cache
          key: rtg-test-v2-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('go.mod', 'compiler*.go', 'rtg_main.go', 'tests/*.go', 'unit_frontend_test.go', 'test_cache_test.go') }}
          restore-keys: |
            rtg-test-v2-${{ runner.os }}-${{ runner.arch }}-

      - name: Build frontend backend
        run: |
          go build -o "$RUNNER_TEMP/rtg-backend" .
          echo "RTG_BACKEND=$RUNNER_TEMP/rtg-backend" >> "$GITHUB_ENV"

      - name: Run compiler resource gates
        env:
          RTG_COMPILER_RESOURCE_GATES: "1"
        run: go test -count=1 -timeout 5m -run '^TestCompilerResourceGates$' .

      - name: Run backend tests
        env:
          RTG_CROSS_ARCH_TESTS: "1"
        run: |
          tests="$(go test -list '^Test' . | grep '^Test' | grep -v '^TestCompilerPerformance$' | grep -v '^TestCompilerResourceGates$' | grep -v '^TestFrontendCompilerPerformance$' | paste -sd'|' -)"
          go test -count=1 -timeout 30m -run "^(${tests})$" .

  backend-arm64:
    name: Backend compiler tests (linux-arm64)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Restore compiler test cache
        uses: actions/cache@v5
        with:
          path: .rtg/test-cache
          key: rtg-test-v2-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('go.mod', 'compiler*.go', 'rtg_main.go', 'tests/*.go', 'unit_frontend_test.go', 'test_cache_test.go') }}
          restore-keys: |
            rtg-test-v2-${{ runner.os }}-${{ runner.arch }}-

      - name: Build frontend backend
        run: |
          go build -o "$RUNNER_TEMP/rtg-backend" .
          echo "RTG_BACKEND=$RUNNER_TEMP/rtg-backend" >> "$GITHUB_ENV"

      - name: Run backend tests
        run: |
          tests="$(go test -list '^Test' . | grep '^Test' | grep -v '^TestCompilerPerformance$' | grep -v '^TestCompilerResourceGates$' | grep -v '^TestFrontendCompilerPerformance$' | paste -sd'|' -)"
          go test -count=1 -timeout 30m -run "^(${tests})$" .

  backend-darwin-arm64:
    name: Backend compiler tests (darwin-arm64)
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Restore compiler test cache
        uses: actions/cache@v5
        with:
          path: .rtg/test-cache
          key: rtg-test-v2-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('go.mod', 'compiler*.go', 'rtg_main.go', 'tests/*.go', 'unit_frontend_test.go', 'test_cache_test.go') }}
          restore-keys: |
            rtg-test-v2-${{ runner.os }}-${{ runner.arch }}-

      - name: Build frontend backend
        run: |
          go build -o "$RUNNER_TEMP/rtg-backend" .
          echo "RTG_BACKEND=$RUNNER_TEMP/rtg-backend" >> "$GITHUB_ENV"

      - name: Run backend tests
        run: |
          tests="$(go test -list '^Test' . | grep '^Test' | grep -v '^TestCompilerPerformance$' | grep -v '^TestCompilerResourceGates$' | grep -v '^TestFrontendCompilerPerformance$' | paste -sd'|' -)"
          go test -count=1 -timeout 30m -run "^(${tests})$" .

      - name: Run Darwin frontend corpus
        env:
          RTG_FRONTEND_EXTENDED_TESTS: "1"
          RTG_FRONTEND_SELFHOST_TESTS: "1"
        run: go test -count=1 -timeout 30m ./rtg_tests

  windows-e2e:
    name: Windows targets end to end (amd64 and 386)
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Build, validate, and execute Windows targets
        env:
          RTG_WINDOWS_GDB: "1"
        run: go test -count=1 -timeout 15m -run '^TestWindows(PEImages|TargetsEndToEnd)$' .

  package-tests:
    name: Package tests (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-latest
          - macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Run tracked package suites
        run: |
          # Do not replace these patterns with ./...: tests/ and the generated
          # corpus contain independent programs with intentionally conflicting
          # package-level declarations, while sandbox/ contains local scratch.
          go test -count=1 ./rtg/internal/... ./rtg/std/... ./rtg/cmd/... ./rtgunit ./cmd/...
          go test -count=1 -tags rtg_bundle ./rtg/internal/driver ./rtg/cmd/rtg

      - name: Check generated capability reports
        run: go run ./cmd/rtgreport -check

  frontend-corpus:
    name: Frontend corpus tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Run frontend corpus tests
        env:
          RTG_FRONTEND_EXTENDED_TESTS: "1"
          RTG_FRONTEND_SELFHOST_TESTS: "1"
          RTG_FRONTEND_BUNDLE_TESTS: "1"
        run: go test -count=1 ./rtg_tests
