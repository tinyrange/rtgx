name: Tests

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  backend-amd64:
    name: Backend compiler tests (linux-amd64)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install QEMU user emulators
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user

      - name: Install Wasmtime
        run: |
          curl -fsSL https://wasmtime.dev/install.sh | bash
          echo "$HOME/.wasmtime/bin" >> "$GITHUB_PATH"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Restore compiler test cache
        uses: actions/cache@v5
        with:
          path: backend/.renvo/test-cache
          key: renvo-test-v2-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('go.mod', 'backend/compiler*.go', 'backend/renvo_main.go', 'backend/tests/*.go', 'backend/unit_frontend_test.go', 'backend/test_cache_test.go') }}
          restore-keys: |
            renvo-test-v2-${{ runner.os }}-${{ runner.arch }}-

      - name: Build backend
        run: |
          go build -o "$RUNNER_TEMP/renvo-backend" ./backend
          echo "RENVO_BACKEND=$RUNNER_TEMP/renvo-backend" >> "$GITHUB_ENV"

      - name: Run compiler resource gates
        env:
          RENVO_COMPILER_RESOURCE_GATES: "1"
        run: go test -count=1 -timeout 5m -run '^TestCompilerResourceGates$' ./backend

      - name: Run frontend compiler performance gate
        env:
          RENVO_STDROOT: ${{ github.workspace }}/std
        run: go test -count=1 -timeout 5m -run '^TestFrontendCompilerPerformance$' ./backend

      - name: Run backend tests
        env:
          RENVO_CROSS_ARCH_TESTS: "1"
        run: |
          tests="$(go test -list '^Test' ./backend | grep '^Test' | grep -v '^TestCompilerPerformance$' | grep -v '^TestCompilerPerformanceWASI$' | grep -v '^TestCompilerResourceGates$' | grep -v '^TestFrontendCompilerPerformance$' | paste -sd'|' -)"
          go test -count=1 -timeout 30m -run "^(${tests})$" ./backend

  backend-arm64:
    name: Backend compiler tests (linux-arm64)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Restore compiler test cache
        uses: actions/cache@v5
        with:
          path: backend/.renvo/test-cache
          key: renvo-test-v2-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('go.mod', 'backend/compiler*.go', 'backend/renvo_main.go', 'backend/tests/*.go', 'backend/unit_frontend_test.go', 'backend/test_cache_test.go') }}
          restore-keys: |
            renvo-test-v2-${{ runner.os }}-${{ runner.arch }}-

      - name: Build backend
        run: |
          go build -o "$RUNNER_TEMP/renvo-backend" ./backend
          echo "RENVO_BACKEND=$RUNNER_TEMP/renvo-backend" >> "$GITHUB_ENV"

      - name: Run backend tests
        run: |
          tests="$(go test -list '^Test' ./backend | grep '^Test' | grep -v '^TestCompilerPerformance$' | grep -v '^TestCompilerPerformanceWASI$' | grep -v '^TestCompilerResourceGates$' | grep -v '^TestFrontendCompilerPerformance$' | paste -sd'|' -)"
          go test -count=1 -timeout 30m -run "^(${tests})$" ./backend

  backend-darwin-arm64:
    name: Backend compiler tests (darwin-arm64)
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Restore compiler test cache
        uses: actions/cache@v5
        with:
          path: backend/.renvo/test-cache
          key: renvo-test-v2-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('go.mod', 'backend/compiler*.go', 'backend/renvo_main.go', 'backend/tests/*.go', 'backend/unit_frontend_test.go', 'backend/test_cache_test.go') }}
          restore-keys: |
            renvo-test-v2-${{ runner.os }}-${{ runner.arch }}-

      - name: Build backend
        run: |
          go build -o "$RUNNER_TEMP/renvo-backend" ./backend
          echo "RENVO_BACKEND=$RUNNER_TEMP/renvo-backend" >> "$GITHUB_ENV"

      - name: Run backend tests
        run: |
          tests="$(go test -list '^Test' ./backend | grep '^Test' | grep -v '^TestCompilerPerformance$' | grep -v '^TestCompilerPerformanceWASI$' | grep -v '^TestCompilerResourceGates$' | grep -v '^TestFrontendCompilerPerformance$' | paste -sd'|' -)"
          go test -count=1 -timeout 30m -run "^(${tests})$" ./backend

      - name: Run Darwin frontend corpus
        env:
          RENVO_FRONTEND_EXTENDED_TESTS: "1"
          RENVO_FRONTEND_SELFHOST_TESTS: "1"
        run: go test -count=1 -timeout 30m ./frontend_tests

  windows-e2e:
    name: Windows targets end to end (amd64 and 386)
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Build, validate, and execute Windows targets
        env:
          RENVO_WINDOWS_GDB: "1"
        run: go test -count=1 -timeout 15m -run '^TestWindows(PEImages|TargetsEndToEnd|GraphicsEndToEnd)$' ./backend

  package-tests:
    name: Package tests (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-latest
          - macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Run tracked package suites
        run: |
          # Do not replace these patterns with ./...: backend/tests and the
          # generated corpus contain independent programs with intentionally
          # conflicting declarations, while sandbox/ contains local scratch.
          go test -count=1 ./internal/... ./std/... ./cmd/... ./backend/unit ./backend/target ./backend/bringup ./backend/omnibus/... ./backend/cmd/...
          go test -count=1 -tags renvo_bundle ./internal/driver ./cmd/renvo

  frontend-corpus:
    name: Frontend corpus tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Run frontend corpus tests
        env:
          RENVO_FRONTEND_EXTENDED_TESTS: "1"
          RENVO_FRONTEND_SELFHOST_TESTS: "1"
          RENVO_FRONTEND_BUNDLE_TESTS: "1"
        run: go test -count=1 ./frontend_tests
