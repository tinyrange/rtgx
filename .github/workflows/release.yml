name: Release

on:
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build-stage2:
    name: Build stage 2 compiler
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build stage 2 compiler
        run: |
          set -eux
          mkdir -p dist
          go build -o dist/rtgx-stage0 \
            rtg_main.go \
            compiler_common.go \
            compiler_amd64_impl.go \
            compiler_linux_amd64_impl.go \
            compiler_main.go
          ./dist/rtgx-stage0 -o dist/rtgx-stage1 \
            compiler_common.go \
            compiler_amd64_impl.go \
            compiler_linux_amd64_impl.go \
            compiler_main.go
          chmod +x dist/rtgx-stage1
          ./dist/rtgx-stage1 -o dist/rtgx-linux-amd64 \
            compiler_common.go \
            compiler_amd64_impl.go \
            compiler_linux_amd64_impl.go \
            compiler_main.go
          chmod +x dist/rtgx-linux-amd64

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: rtgx-linux-amd64
          path: dist/rtgx-linux-amd64
          if-no-files-found: error

      - name: Upload release asset
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" dist/rtgx-linux-amd64 --clobber
