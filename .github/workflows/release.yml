name: Release

on:
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build-release:
    name: Build release compilers
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Build backend compilers
        run: |
          set -eux
          mkdir -p dist
          mapfile -t compiler_names < backend/compiler_sources.txt
          compiler_files=()
          for name in "${compiler_names[@]}"; do
            compiler_files+=("backend/$name")
          done
          go build -o dist/renvo-backend-stage0 \
            backend/renvo_main.go \
            "${compiler_files[@]}"
          ./dist/renvo-backend-stage0 -t linux/amd64 -s -o dist/renvo-backend-stage1 \
            "${compiler_files[@]}"
          chmod +x dist/renvo-backend-stage1
          ./dist/renvo-backend-stage1 -t linux/amd64 -s -o dist/renvo-backend-linux-amd64 \
            "${compiler_files[@]}"
          ./dist/renvo-backend-stage1 -t linux/aarch64 -s -o dist/renvo-backend-linux-arm64 \
            "${compiler_files[@]}"
          chmod +x dist/renvo-backend-linux-amd64 dist/renvo-backend-linux-arm64

      - name: Build frontend compilers
        run: |
          set -eux
          go build -tags renvo_bundle -o dist/renvo-stage0 ./cmd/renvo
          RENVO_BACKEND="$PWD/dist/renvo-backend-linux-amd64" \
            ./dist/renvo-stage0 -tags renvo_bundle -t linux/amd64 -s -o dist/renvo-linux-amd64-stage1 ./cmd/renvo
          ./dist/renvo-linux-amd64-stage1 -tags renvo_bundle -t linux/amd64 -s -o dist/renvo-linux-amd64 ./cmd/renvo
          ./dist/renvo-linux-amd64-stage1 -tags renvo_bundle -t linux/386 -s -o dist/renvo-linux-386 ./cmd/renvo
          ./dist/renvo-linux-amd64-stage1 -tags renvo_bundle -t linux/aarch64 -s -o dist/renvo-linux-arm64 ./cmd/renvo
          ./dist/renvo-linux-amd64-stage1 -tags renvo_bundle -t linux/arm -s -o dist/renvo-linux-arm ./cmd/renvo
          ./dist/renvo-linux-amd64-stage1 -tags renvo_bundle -t windows/amd64 -s -o dist/renvo-windows-amd64.exe ./cmd/renvo
          ./dist/renvo-linux-amd64-stage1 -tags renvo_bundle -t windows/386 -s -o dist/renvo-windows-386.exe ./cmd/renvo
          ./dist/renvo-linux-amd64-stage1 -tags renvo_bundle -t windows/arm64 -s -o dist/renvo-windows-arm64.exe ./cmd/renvo
          ./dist/renvo-linux-amd64-stage1 -tags renvo_bundle -t darwin/arm64 -s -o dist/renvo-darwin-arm64 ./cmd/renvo
          ./dist/renvo-linux-amd64-stage1 -tags renvo_bundle -t wasi/wasm32 -s -o dist/renvo-wasi-wasm32.wasm ./cmd/renvo
          chmod +x \
            dist/renvo-linux-amd64 \
            dist/renvo-linux-386 \
            dist/renvo-linux-arm64 \
            dist/renvo-linux-arm \
            dist/renvo-darwin-arm64

      - name: Check release frontend help
        run: |
          set -eux
          ./dist/renvo-linux-amd64 > dist/renvo-help.txt
          grep -F "Usage: renvo" dist/renvo-help.txt
          grep -F "windows/amd64" dist/renvo-help.txt
          grep -F "windows/arm64" dist/renvo-help.txt
          grep -F "darwin/arm64" dist/renvo-help.txt
          grep -F "wasi/wasm32" dist/renvo-help.txt

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: renvo-release-binaries
          path: |
            dist/renvo-backend-linux-amd64
            dist/renvo-backend-linux-arm64
            dist/renvo-linux-amd64
            dist/renvo-linux-386
            dist/renvo-linux-arm64
            dist/renvo-linux-arm
            dist/renvo-windows-amd64.exe
            dist/renvo-windows-386.exe
            dist/renvo-windows-arm64.exe
            dist/renvo-darwin-arm64
            dist/renvo-wasi-wasm32.wasm
          if-no-files-found: error

      - name: Upload release assets
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$GITHUB_REF_NAME" \
            dist/renvo-backend-linux-amd64 \
            dist/renvo-backend-linux-arm64 \
            dist/renvo-linux-amd64 \
            dist/renvo-linux-386 \
            dist/renvo-linux-arm64 \
            dist/renvo-linux-arm \
            dist/renvo-windows-amd64.exe \
            dist/renvo-windows-386.exe \
            dist/renvo-windows-arm64.exe \
            dist/renvo-darwin-arm64 \
            dist/renvo-wasi-wasm32.wasm \
            --clobber
